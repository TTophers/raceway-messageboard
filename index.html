<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Message Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .message-enter { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="bg-indigo-600 p-2 rounded-lg">
          <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
        </div>
        <h1 class="text-xl font-semibold text-gray-900">Secure Messages</h1>
      </div>
      <div class="flex items-center gap-3">
        <span id="connection-status" class="flex items-center gap-2 text-sm text-gray-500">
          <span class="w-2 h-2 bg-green-500 rounded-full"></span>
          Connected
        </span>
        <button id="refresh-btn" class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
          <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Stats Bar -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white p-4 rounded-xl border border-gray-200">
        <p class="text-sm text-gray-500 mb-1">Total Messages</p>
        <p id="total-count" class="text-2xl font-bold text-gray-900">-</p>
      </div>
      <div class="bg-white p-4 rounded-xl border border-gray-200">
        <p class="text-sm text-gray-500 mb-1">Unread</p>
        <p id="unread-count" class="text-2xl font-bold text-indigo-600">-</p>
      </div>
      <div class="bg-white p-4 rounded-xl border border-gray-200">
        <p class="text-sm text-gray-500 mb-1">Last Updated</p>
        <p id="last-updated" class="text-sm font-medium text-gray-900">-</p>
      </div>
    </div>

    <!-- Messages Section -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="p-4 border-b border-gray-200 flex items-center justify-between">
        <h2 class="font-semibold text-gray-900">Messages</h2>
        <div class="flex items-center gap-2">
          <button id="filter-all" class="px-3 py-1.5 text-sm font-medium rounded-lg bg-indigo-50 text-indigo-700">All</button>
          <button id="filter-unread" class="px-3 py-1.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-100">Unread</button>
        </div>
      </div>

      <!-- Loading State -->
      <div id="loading-state" class="p-8">
        <div class="space-y-4">
          <div class="flex gap-4">
            <div class="w-10 h-10 bg-gray-200 rounded-full skeleton"></div>
            <div class="flex-1 space-y-2">
              <div class="h-4 bg-gray-200 rounded w-1/4 skeleton"></div>
              <div class="h-3 bg-gray-200 rounded w-3/4 skeleton"></div>
              <div class="h-3 bg-gray-200 rounded w-1/2 skeleton"></div>
            </div>
          </div>
          <div class="flex gap-4">
            <div class="w-10 h-10 bg-gray-200 rounded-full skeleton"></div>
            <div class="flex-1 space-y-2">
              <div class="h-4 bg-gray-200 rounded w-1/3 skeleton"></div>
              <div class="h-3 bg-gray-200 rounded w-2/3 skeleton"></div>
            </div>
          </div>
          <div class="flex gap-4">
            <div class="w-10 h-10 bg-gray-200 rounded-full skeleton"></div>
            <div class="flex-1 space-y-2">
              <div class="h-4 bg-gray-200 rounded w-1/4 skeleton"></div>
              <div class="h-3 bg-gray-200 rounded w-full skeleton"></div>
              <div class="h-3 bg-gray-200 rounded w-3/4 skeleton"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Error State -->
      <div id="error-state" class="hidden p-8 text-center">
        <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
          <i data-lucide="alert-circle" class="w-8 h-8 text-red-500"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-900 mb-2">Failed to load messages</h3>
        <p id="error-message" class="text-gray-500 mb-4">Something went wrong</p>
        <button id="retry-btn" class="px-4 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors">
          Try Again
        </button>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden p-8 text-center">
        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i data-lucide="inbox" class="w-8 h-8 text-gray-400"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-900 mb-2">No messages yet</h3>
        <p class="text-gray-500">Your inbox is empty. Check back later!</p>
      </div>

      <!-- Messages List -->
      <div id="messages-list" class="hidden divide-y divide-gray-200"></div>
    </div>
  </main>

  <!-- Toast Notifications -->
  <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
